name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      
      - name: Check gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fluxa_user
          POSTGRES_PASSWORD: fluxa_password
          POSTGRES_DB: fluxa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Setup Database Schema
        run: |
          export PGPASSWORD=fluxa_password
          psql -h localhost -U fluxa_user -d fluxa -f migrations/001_create_events_table.sql
          psql -h localhost -U fluxa_user -d fluxa -f migrations/002_create_idempotency_keys_table.sql
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        env:
          TEST_DB_DSN: "host=localhost port=5432 user=fluxa_user password=fluxa_password dbname=fluxa sslmode=disable"
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Check test coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Coverage: $COVERAGE%"
          COVERAGE_NUM=$(echo $COVERAGE | sed 's/%//' | awk '{print int($1)}')
          if [ "$COVERAGE_NUM" -lt 60 ]; then
            echo "ERROR: Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build all services
        run: go build ./services/...

  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/terraform/
      
      - name: Terraform Init (dev)
        working-directory: infra/terraform/envs/dev
        run: terraform init -backend=false
      
      - name: Terraform Validate (dev)
        working-directory: infra/terraform/envs/dev
        run: terraform validate
      
      - name: Terraform Init (prod)
        working-directory: infra/terraform/envs/prod
        run: terraform init -backend=false
      
      - name: Terraform Validate (prod)
        working-directory: infra/terraform/envs/prod
        run: terraform validate

