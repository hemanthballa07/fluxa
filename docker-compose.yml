services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: fluxa-postgres
    environment:
      POSTGRES_DB: fluxa
      POSTGRES_USER: fluxa_user
      POSTGRES_PASSWORD: fluxa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxa_user -d fluxa"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fluxa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fluxa
      RABBITMQ_DEFAULT_PASS: fluxa_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: fluxa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: fluxa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: fluxa-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ─────────────────────────────────────────────
  # Application services
  # ─────────────────────────────────────────────

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: fluxa-ingest
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fluxa
      DB_USER: fluxa_user
      DB_PASSWORD: fluxa_password
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://fluxa:fluxa_pass@rabbitmq:5672/
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: fluxa-events
      MINIO_USE_SSL: "false"
      ENVIRONMENT: local
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    container_name: fluxa-processor
    ports:
      - "9092:9092"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fluxa
      DB_USER: fluxa_user
      DB_PASSWORD: fluxa_password
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://fluxa:fluxa_pass@rabbitmq:5672/
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: fluxa-events
      MINIO_USE_SSL: "false"
      RULES_FILE: /app/rules.yaml
      ENVIRONMENT: local
      LOG_LEVEL: info
    volumes:
      - ./rules.yaml:/app/rules.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  query:
    build:
      context: .
      dockerfile: services/query/Dockerfile
    container_name: fluxa-query
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fluxa
      DB_USER: fluxa_user
      DB_PASSWORD: fluxa_password
      DB_SSL_MODE: disable
      ENVIRONMENT: local
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  alert-consumer:
    build:
      context: .
      dockerfile: services/alert-consumer/Dockerfile
    container_name: fluxa-alert-consumer
    ports:
      - "9094:9094"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fluxa
      DB_USER: fluxa_user
      DB_PASSWORD: fluxa_password
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://fluxa:fluxa_pass@rabbitmq:5672/
      ENVIRONMENT: local
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  replay:
    build:
      context: .
      dockerfile: services/replay/Dockerfile
    container_name: fluxa-replay
    environment:
      INGEST_URL: http://ingest:8080
      CSV_FILE: /data/transactions.csv
      RATE_PER_SEC: "200"
      # replay doesn't need DB — provide dummy values to pass config validation
      DB_HOST: postgres
      DB_USER: fluxa_user
      DB_PASSWORD: fluxa_password
      ENVIRONMENT: local
    volumes:
      - ./data:/data:ro
    depends_on:
      ingest:
        condition: service_started
    profiles:
      - replay
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
  grafana_data:
