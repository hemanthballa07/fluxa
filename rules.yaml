# Fluxa Fraud Detection Rules
# Modify these values and restart the processor container — no rebuild needed.

# Flag transactions where amount exceeds this threshold (in USD)
amount_threshold: 500.00

# Velocity check: flag if a user submits more than velocity_max_count
# transactions within velocity_window_seconds seconds
velocity_window_seconds: 60
velocity_max_count: 3

# Exact-match merchant names to flag immediately
# Names derived from IEEE-CIS ProductCD + card4 lookup — these are the top merchants by volume
blocked_merchants:
  - "Amazon Marketplace"
  - "Walmart Online"
  - "Target"

# Currency codes considered high-risk
high_risk_currencies:
  - "XMR"
  - "ZEC"
  - "DASH"
