global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fluxa-ingest
    static_configs:
      - targets: ["ingest:9091"]

  - job_name: fluxa-processor
    static_configs:
      - targets: ["processor:9092"]

  - job_name: fluxa-query
    static_configs:
      - targets: ["query:9093"]

  - job_name: fluxa-alert-consumer
    static_configs:
      - targets: ["alert-consumer:9094"]
