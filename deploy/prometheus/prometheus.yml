global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fluxa-ingest
    static_configs:
      - targets: ["ingest:9091"]

  - job_name: fluxa-processor
    static_configs:
      - targets: ["processor:9092"]

  - job_name: fluxa-query
    static_configs:
      - targets: ["query:9093"]

  - job_name: fluxa-alert-consumer
    static_configs:
      - targets: ["alert-consumer:9094"]

  - job_name: fluxa-fraud-grpc
    static_configs:
      - targets: ["fraud-grpc:9096"]

  - job_name: fluxa-ml-scorer
    static_configs:
      - targets: ["ml-scorer:9098"]

  - job_name: fluxguard
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8091"]
